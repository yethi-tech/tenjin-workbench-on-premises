database:
  type: postgres # postgres | oracle

tenjin:
  persistence:
    size: "6Gi"
    storageClassName: standard
  service:
    type: NodePort
    port: 8080

elasticsearch:
  config:
    bootstrap_memory_lock: true
    ES_JAVA_OPTS: "-Xms512m -Xmx2G"
  persistence:
    accessModes: ReadWriteOnce
    storageClassName: standard
    size: 5Gi

postgres:
  enabled: true
  image: "postgres:15"
  persistence:
    size: 10Gi
    accessModes: ReadWriteOnce
    storageClassName: standard

environment:
  # PostgreSQL
  POSTGRES_DB: tenjin
  POSTGRES_USER: yethi
  POSTGRES_PASSWORD: Yethi123

  # Oracle
  ORACLE_HOST: ""
  ORACLE_PORT: "1521"
  ORACLE_SERVICE: ""
  ORACLE_USER: ""
  ORACLE_PASSWORD: ""

  # Elasticsearch
  ELASTIC_PORT: "9200"
  ELASTIC_USERNAME: "elastic"
  ELASTIC_SECURETYPE: "http"

tenjinkairo:
  image: "registry.gitlab.com/yethi/rnd/gen-ai/copilot-service/tenjin-copilot-service:4.17.2"
  VECTOR_STORE_ID: ""
  TEST_GEN_INSTANCE: ""
  TEST_GEN_OPENAI_API_KEY: ""
  OPENAI_API_KEY: ""
  LANGSMITH_API_KEY: ""

tenjincore:
  image: "registry.gitlab.com/yethi/tenjin-enterprise/devops/docker_image_builder/tenjin-enterprise:4.17.2"
  TENJIN_DEFAULT_USER_PASSWORD: ""
  TENJIN_BASE_URL: ""
  TENJIN_ALLOWED_URL: ""
  TENJIN_AI_HOST: ""
  OPENAI_API_KEY: ""
  TENJIN_SCHEDULER_RETENTION_DAYS: ""
  TENJIN_SCHEDULER_CRON: ""
  MAIL_PWD: ""
  COOKIE_SECURE: "false"
  SSL_ENABLED: "false"

pgadmin:
  image: "dpage/pgadmin4:8.5"
  email: admin@yethi.in
  password: admin123
  persistence:
    accessMode: ReadWriteOnce
    size: 2Gi
    storageClassName: standard