{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-postgres-config
data:
  POSTGRES_DB: {{ .Values.environment.POSTGRES_DB | quote }}
  POSTGRES_USER: {{ .Values.environment.POSTGRES_USER | quote }}
  POSTGRES_PASSWORD: {{ .Values.environment.POSTGRES_PASSWORD | quote }}
{{- end }}